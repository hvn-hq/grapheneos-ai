name: Build Debug APK

on:
  push:
    branches: [ main, 'fix/**', 'feature/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache llama.cpp build
      uses: actions/cache@v4
      with:
        path: |
          app/src/main/cpp/llama/build-android
          app/src/main/cpp/llama/prebuilt
        key: llama-build-${{ hashFiles('scripts/build-llama-android.sh') }}
        restore-keys: |
          llama-build-

    - name: Install NDK and CMake via sdkmanager
      run: |
        yes | sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1" 2>&1 | tail -5
        echo "NDK_PATH=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

    - name: Build llama.cpp native libraries
      run: |
        chmod +x scripts/build-llama-android.sh
        ./scripts/build-llama-android.sh "$NDK_PATH"

    - name: Copy llama.cpp headers for JNI build
      run: |
        LLAMA_SRC="app/src/main/cpp/llama/build-android/llama.cpp-src"
        INCLUDE_DIR="app/src/main/cpp/llama/prebuilt/arm64-v8a/include"
        mkdir -p "$INCLUDE_DIR"
        cp "$LLAMA_SRC/include/llama.h" "$INCLUDE_DIR/"
        cp "$LLAMA_SRC/ggml/include/ggml.h" "$INCLUDE_DIR/" 2>/dev/null || true
        cp "$LLAMA_SRC/ggml/include/ggml-backend.h" "$INCLUDE_DIR/" 2>/dev/null || true
        echo "Headers copied:"
        ls -la "$INCLUDE_DIR/"

    - name: Verify prebuilt libraries
      run: |
        echo "Checking prebuilt libraries..."
        ls -la app/src/main/cpp/llama/prebuilt/arm64-v8a/
        for lib in libggml-base.so libggml-cpu.so libggml.so libllama.so; do
          if [ ! -f "app/src/main/cpp/llama/prebuilt/arm64-v8a/$lib" ]; then
            echo "ERROR: Missing $lib"
            exit 1
          fi
        done
        test -f app/src/main/cpp/llama/prebuilt/arm64-v8a/include/llama.h || { echo "ERROR: Missing llama.h"; exit 1; }
        echo "All required libraries and headers present."

    - name: Create gradle.properties
      run: |
        cat > gradle.properties <<'EOF'
        android.useAndroidX=true
        android.nonTransitiveRClass=true
        kotlin.code.style=official
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        MYAPP_UPLOAD_STORE_FILE=not-used
        MYAPP_UPLOAD_STORE_PASSWORD=not-used
        MYAPP_UPLOAD_KEY_ALIAS=not-used
        MYAPP_UPLOAD_KEY_PASSWORD=not-used
        EOF
        # Strip leading whitespace from heredoc (YAML indentation artifact)
        sed -i 's/^[[:space:]]*//' gradle.properties

    - name: Build debug APK
      run: |
        chmod +x gradlew
        ./gradlew :app:assembleDebug --no-daemon

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: grapheneos-ai-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        if-no-files-found: error
